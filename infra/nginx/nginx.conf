user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ─── Logging ──────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  '$request_time $upstream_response_time';

  log_format json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_time":"$upstream_response_time",'
    '"referer":"$http_referer",'
    '"user_agent":"$http_user_agent",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"request_id":"$http_x_request_id"'
  '}';

  access_log /var/log/nginx/access.log json;
  error_log /var/log/nginx/error.log warn;

  # ─── Basic Settings ───────────────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 50M;
  server_names_hash_bucket_size 128;
  underscores_in_headers on;

  # ─── Gzip ─────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript
             image/svg+xml;

  # ─── Rate Limiting ────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
  limit_req_zone $http_x_forwarded_for zone=webhook:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=static:10m rate=1000r/m;
  limit_req_zone $http_x_api_key zone=authenticated:10m rate=1000r/m;
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  # ─── Upstreams ────────────────────────────────────────────────────────────
  upstream api-gateway {
    least_conn;
    server 127.0.0.1:3001 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream identity-service {
    least_conn;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream booking-service {
    least_conn;
    server 127.0.0.1:3003 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream payments-service {
    least_conn;
    server 127.0.0.1:3004 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream crm-service {
    least_conn;
    server 127.0.0.1:3005 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream dispatch-service {
    least_conn;
    server 127.0.0.1:3006 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream messaging-service {
    least_conn;
    server 127.0.0.1:3007 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream workflow-service {
    least_conn;
    server 127.0.0.1:3008 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream rewards-service {
    least_conn;
    server 127.0.0.1:3009 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream documents-service {
    least_conn;
    server 127.0.0.1:3010 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream ai-orchestrator-service {
    least_conn;
    server 127.0.0.1:3011 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  upstream analytics-service {
    least_conn;
    server 127.0.0.1:3012 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  # ─── SSL/TLS (certbot-ready) ──────────────────────────────────────────────
  ssl_certificate /etc/letsencrypt/live/serviceops.co.ke/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/serviceops.co.ke/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:50m;
  ssl_session_tickets off;
  ssl_protocols TLSv1.3 TLSv1.2;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 8.8.8.8 8.8.4.4 valid=300s;
  resolver_timeout 5s;

  # ─── Security Headers ─────────────────────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # ─── CORS (pre-flight) ────────────────────────────────────────────────────
  map $http_origin $cors_origin {
    default "";
    "~^https?://localhost(:[0-9]+)?$" "$http_origin";
    "~^https?://.*\.serviceops\.co\.ke$" "$http_origin";
    "~^https?://.*\.vercel\.app$" "$http_origin";
  }

  # ─── Main Server (HTTP → HTTPS redirect) ──────────────────────────────────
  server {
    listen 80;
    server_name serviceops.co.ke *.serviceops.co.ke localhost;
    return 301 https://$server_name$request_uri;
  }

  # ─── HTTPS Server ─────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name serviceops.co.ke *.serviceops.co.ke;

    # ─── API Gateway (primary entry point) ────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      limit_conn addr 10;

      proxy_pass http://api-gateway;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $http_x_request_id;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
      proxy_connect_timeout 10s;

      add_header Access-Control-Allow-Origin $cors_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-ID,X-Idempotency-Key" always;
      add_header Access-Control-Expose-Headers "Content-Length,Content-Range,X-Request-ID" always;

      if ($request_method = "OPTIONS") {
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-ID,X-Idempotency-Key" always;
        add_header Access-Control-Max-Age 86400;
        return 204;
      }
    }

    # ─── MinIO Console ─────────────────────────────────────────────────────
    location /minio/ {
      proxy_pass http://127.0.0.1:9001;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── MinIO API ─────────────────────────────────────────────────────────
    location /storage/ {
      proxy_pass http://127.0.0.1:9000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    # ─── Static Assets ────────────────────────────────────────────────────
    location /static/ {
      limit_req zone=static burst=50 nodelay;
      root /var/www/serviceops;
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # ─── Health Check ─────────────────────────────────────────────────────
    location /health {
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }

    # ─── Deny access to hidden files ─────────────────────────────────────
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }

    # ─── Deny access to sensitive paths ──────────────────────────────────
    location ~* (node_modules|\.git|\.env|\.log) {
      deny all;
      access_log off;
      log_not_found off;
    }
  }

  # ─── Rate Limit Status Pages ──────────────────────────────────────────────
  error_page 429 /429.html;
  location = /429.html {
    internal;
    return 429 '{"success":false,"error":{"code":"RATE_LIMITED","message":"Too many requests. Please try again later."}}';
    add_header Content-Type application/json;
  }

  error_page 502 /502.html;
  location = /502.html {
    internal;
    return 502 '{"success":false,"error":{"code":"UPSTREAM_ERROR","message":"Service temporarily unavailable."}}';
    add_header Content-Type application/json;
  }
}
